name: Rust Artifacts

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  wheels:
    name: Build core wheel (${{ matrix.os }}-${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Minimal release matrix (expand after real demand)
          - os: ubuntu-latest
            python: "3.12"
            artifact_target: x86_64
          - os: macos-latest
            python: "3.12"
            artifact_target: arm64
          - os: windows-latest
            python: "3.12"
            artifact_target: x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target || '' }}

      - name: Build wheel via maturin
        uses: PyO3/maturin-action@v1
        with:
          working-directory: rust
          command: build
          args: --release -i ${{ startsWith(matrix.os, 'windows') && 'python' || format('python{0}', matrix.python) }} --out ../dist ${{ matrix.target && format('--target {0}', matrix.target) || '' }} ${{ matrix.target == 'aarch64-unknown-linux-gnu' && '--zig' || '' }}

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v5
        with:
          name: core-wheel-${{ matrix.os }}-${{ matrix.python }}-${{ matrix.artifact_target }}
          path: dist/*.whl
          if-no-files-found: error

  # Build source distribution (only once, on ubuntu-latest with default Python)
  sdist:
    name: Build core sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build sdist via maturin
        uses: PyO3/maturin-action@v1
        with:
          working-directory: rust
          command: sdist
          args: --out ../dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v5
        with:
          name: core-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  smoke-test:
    name: Smoke test (${{ matrix.os }}-${{ matrix.python }})
    needs: wheels
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.12"
            target: x86_64
          - os: macos-latest
            python: "3.12"
            target: arm64
          - os: windows-latest
            python: "3.12"
            target: x86_64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v5
        with:
          name: core-wheel-${{ matrix.os }}-${{ matrix.python }}-${{ matrix.target }}
          path: dist

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install wheel and test
        shell: bash
        run: |
          # Find the wheel file
          WHEEL=$(ls dist/*.whl | head -1)
          echo "Installing $WHEEL"
          pip install "$WHEEL"

          # Run smoke tests
          cat > smoke_test.py <<'PY'
          import sys
          print(f"Python: {sys.version}")

          # Test 1: Import module
          print("Test 1: Importing town_elder._core...")
          import town_elder._core
          print(f"  Module version: {town_elder._core.version()}")

          # Test 2: List supported models
          print("Test 2: Listing supported embedding models...")
          models = town_elder._core.PyTextEmbedder.list_supported_models()
          print(f"  Found {len(models)} models: {models[:2]}...")
          # Dynamically select a valid model (first entry)
          model_id = models[0][0] if models else None
          if not model_id:
              raise RuntimeError("No embedding models available")
          print(f"  Using model: {model_id}")

          # Test 3: Create embedder with dynamically selected model
          print("Test 3: Creating embedder with dynamic model...")
          embedder = town_elder._core.PyTextEmbedder(model_id)
          print(f"  Model: {embedder.get_model_name()}, Dimension: {embedder.dimension()}")

          # Test 4: Embed single text
          print("Test 4: Embedding single text...")
          embedding = embedder.embed_single("Hello, world!")
          print(f"  Embedding length: {len(embedding)}")

          # Test 5: Embed multiple texts
          print("Test 5: Embedding multiple texts...")
          embeddings = embedder.embed(["Hello", "World"])
          print(f"  Number of embeddings: {len(embeddings)}, dim: {len(embeddings[0])}")

          print("All smoke tests passed!")
          PY

          python smoke_test.py

  native-binary:
    name: Build te-rs binary (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build te-rs
        run: cargo build --manifest-path rust/Cargo.toml --release --bin te-rs

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p dist
          BIN_PATH="rust/target/release/te-rs"
          if [ ! -f "$BIN_PATH" ]; then
            echo "Binary not found: $BIN_PATH"
            exit 1
          fi

          ARTIFACT_BASE="te-rs-${{ runner.os }}-${{ runner.arch }}"
          cp "$BIN_PATH" "dist/$ARTIFACT_BASE"
          tar -czf "dist/$ARTIFACT_BASE.tar.gz" -C dist "$ARTIFACT_BASE"

      - name: Upload native artifact
        uses: actions/upload-artifact@v5
        with:
          name: te-rs-${{ matrix.os }}
          path: |
            dist/te-rs-*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: [wheels, sdist, smoke-test]
    if: github.event_name == 'release' && startsWith(github.ref_name, 'v') && github.event.release.prerelease == false
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/town-elder-core/
    permissions:
      attestations: write
      contents: read
      id-token: write
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: core-wheel-*
          path: dist-flat
          merge-multiple: true

      - name: Download sdist artifact
        uses: actions/download-artifact@v5
        with:
          name: core-sdist
          path: dist-flat

      - uses: actions/checkout@v4

      - name: Inspect publish artifacts
        shell: bash
        run: |
          ls -la dist-flat/
          ls dist-flat/*.whl
          ls dist-flat/*.tar.gz

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.7.21"

      - name: Verify release tag matches workspace and artifact versions
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python3 - <<'PY'
          import os
          import re
          import sys
          from pathlib import Path

          tag = os.environ["RELEASE_TAG"]
          if not tag.startswith("v"):
              print(f"Release tag must start with 'v': {tag}", file=sys.stderr)
              sys.exit(1)
          tag_version = tag[1:]

          workspace_toml = Path("rust/Cargo.toml").read_text(encoding="utf-8")
          workspace_match = re.search(
              r"(?ms)^\[workspace\.package\].*?^version\s*=\s*\"([^\"]+)\"",
              workspace_toml,
          )
          if not workspace_match:
              print("Could not determine workspace version from rust/Cargo.toml", file=sys.stderr)
              sys.exit(1)
          workspace_version = workspace_match.group(1)

          dist_dir = Path("dist-flat")
          wheels = sorted(dist_dir.glob("*.whl"))
          sdists = sorted(dist_dir.glob("*.tar.gz"))
          if not wheels:
              print("No wheel artifacts found in dist-flat", file=sys.stderr)
              sys.exit(1)
          if len(sdists) != 1:
              print(f"Expected exactly one sdist artifact, found {len(sdists)}", file=sys.stderr)
              sys.exit(1)

          wheel_pattern = re.compile(r"^town_elder_core-([A-Za-z0-9._+!-]+)-")
          sdist_pattern = re.compile(r"^town_elder_core-([A-Za-z0-9._+!-]+)\.tar\.gz$")

          versions = set()
          for wheel in wheels:
              match = wheel_pattern.match(wheel.name)
              if not match:
                  print(f"Unexpected wheel filename: {wheel.name}", file=sys.stderr)
                  sys.exit(1)
              versions.add(match.group(1))

          sdist_match = sdist_pattern.match(sdists[0].name)
          if not sdist_match:
              print(f"Unexpected sdist filename: {sdists[0].name}", file=sys.stderr)
              sys.exit(1)
          versions.add(sdist_match.group(1))

          if len(versions) != 1:
              print(f"Artifact version mismatch across files: {sorted(versions)}", file=sys.stderr)
              sys.exit(1)
          artifact_version = next(iter(versions))

          print(f"Tag version: {tag_version}")
          print(f"Workspace version: {workspace_version}")
          print(f"Artifact version: {artifact_version}")

          if artifact_version != workspace_version:
              print(
                  f"Version mismatch: artifact={artifact_version}, workspace={workspace_version}",
                  file=sys.stderr,
              )
              sys.exit(1)
          if tag_version != artifact_version:
              print(f"Version mismatch: tag={tag_version}, artifact={artifact_version}", file=sys.stderr)
              sys.exit(1)
          PY

      - name: Generate artifact attestations
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist-flat/*"

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always --check-url https://pypi.org/simple/ dist-flat/*
