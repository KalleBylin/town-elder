name: Rust Artifacts

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  wheels:
    name: Build te-core wheel (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build wheel via maturin
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --manifest-path rust/src/Cargo.toml --release --features python --out dist

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v5
        with:
          name: te-core-wheel-${{ matrix.os }}
          path: dist/*.whl
          if-no-files-found: error

  smoke-test:
    name: Smoke test (${{ matrix.os }})
    needs: wheels
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: te-core-wheel-${{ matrix.os }}
          path: dist

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install wheel and test
        shell: bash
        run: |
          # Find the wheel file
          WHEEL=$(ls dist/*.whl | head -1)
          echo "Installing $WHEEL"
          pip install "$WHEEL"

          # Run smoke tests
          python -c "
import sys
print(f'Python: {sys.version}')

# Test 1: Import module
print('Test 1: Importing town_elder._te_core...')
import town_elder._te_core
print(f'  Module version: {town_elder._te_core.version()}')

# Test 2: List supported models
print('Test 2: Listing supported embedding models...')
models = town_elder._te_core.PyTextEmbedder.list_supported_models()
print(f'  Found {len(models)} models: {models[:2]}...')

# Dynamically select a valid model (first entry)
model_id = models[0][0] if models else None
if not model_id:
    raise RuntimeError('No embedding models available')
print(f'  Using model: {model_id}')

# Test 3: Create embedder with dynamically selected model
print('Test 3: Creating embedder with dynamic model...')
embedder = town_elder._te_core.PyTextEmbedder(model_id)
print(f'  Model: {embedder.get_model_name()}, Dimension: {embedder.dimension()}')

# Test 4: Embed single text
print('Test 4: Embedding single text...')
embedding = embedder.embed_single('Hello, world!')
print(f'  Embedding length: {len(embedding)}')

# Test 5: Embed multiple texts
print('Test 5: Embedding multiple texts...')
embeddings = embedder.embed(['Hello', 'World'])
print(f'  Number of embeddings: {len(embeddings)}, dim: {len(embeddings[0])}')

print('All smoke tests passed!')
"

  native-binary:
    name: Build te-rs binary (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build te-rs
        run: cargo build --manifest-path rust/Cargo.toml --release --bin te-rs

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p dist
          BIN_PATH="rust/target/release/te-rs"
          if [ ! -f "$BIN_PATH" ]; then
            echo "Binary not found: $BIN_PATH"
            exit 1
          fi

          ARTIFACT_BASE="te-rs-${{ runner.os }}-${{ runner.arch }}"
          cp "$BIN_PATH" "dist/$ARTIFACT_BASE"
          tar -czf "dist/$ARTIFACT_BASE.tar.gz" -C dist "$ARTIFACT_BASE"

      - name: Upload native artifact
        uses: actions/upload-artifact@v5
        with:
          name: te-rs-${{ matrix.os }}
          path: |
            dist/te-rs-*.tar.gz
          if-no-files-found: error
